<svg xmlns="http://www.w3.org/2000/svg" width="430" height="932" viewBox="0 0 430 932" role="img" aria-label="Worldwave Radio 2077 mobile interface preview">
  <title>Worldwave Radio 2077 Mobile Preview</title>
  <defs>
    <radialGradient id="phoneBg" cx="50%" cy="8%" r="95%">
      <stop offset="0" stop-color="#303034"/>
      <stop offset="0.5" stop-color="#161617"/>
      <stop offset="1" stop-color="#070708"/>
    </radialGradient>
    <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#181818"/>
    </linearGradient>
    <filter id="greenGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orangeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(255,255,255,0.035)"/>
      <rect y="2" width="4" height="2" fill="rgba(0,0,0,0.2)"/>
    </pattern>
  </defs>

  <rect width="430" height="932" rx="44" fill="#0b0b0c"/>
  <rect x="14" y="14" width="402" height="904" rx="38" fill="url(#phoneBg)" stroke="#202023"/>

  <text x="40" y="56" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#f5f5f7">19:40</text>
