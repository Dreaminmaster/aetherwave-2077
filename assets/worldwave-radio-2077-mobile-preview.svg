  <text x="352" y="56" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#f5f5f7">5G</text>
  <rect x="381" y="42" width="24" height="13" rx="4" fill="none" stroke="#f5f5f7" stroke-width="2"/>
  <rect x="406" y="46" width="2" height="5" rx="1" fill="#f5f5f7"/>
  <rect x="384" y="45" width="16" height="7" rx="2" fill="#f5f5f7"/>

