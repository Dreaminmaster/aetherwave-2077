    <text x="298" y="682" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#777">FINE TUNE</text>
    <text x="342" y="674" text-anchor="end" font-family="Courier New, monospace" font-size="9" fill="#555">/by @Dreaminmaster</text>
