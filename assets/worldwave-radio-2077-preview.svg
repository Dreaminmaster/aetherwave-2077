<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Worldwave Radio 2077 mobile preview">
  <title>Worldwave Radio 2077 Mobile Preview</title>
  <defs>
    <radialGradient id="pageBg" cx="50%" cy="15%" r="80%">
      <stop offset="0" stop-color="#2b2b2d"/>
      <stop offset="0.55" stop-color="#151516"/>
      <stop offset="1" stop-color="#070708"/>
    </radialGradient>
    <linearGradient id="phoneEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f21"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#292929"/>
      <stop offset="1" stop-color="#181818"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="2.5" fill="rgba(255,255,255,0.04)"/>
      <rect y="2.5" width="5" height="2.5" fill="rgba(0,0,0,0.18)"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#pageBg)"/>
  <text x="600" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#f2f2f2">Worldwave Radio 2077</text>
  <text x="600" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#a8a8a8">mobile web radio experience · power-on screen · live global stations</text>

  <!-- Phone 1: Power-on screen -->
  <g transform="translate(220 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="620" rx="48" fill="url(#phoneEdge)" stroke="#3d3d40" stroke-width="3"/>
    <rect x="17" y="18" width="266" height="584" rx="36" fill="#000"/>
    <rect x="109" y="30" width="82" height="18" rx="9" fill="#111"/>
    <text x="150" y="244" text-anchor="middle" font-family="Courier New, monospace" font-size="45" fill="#00ff41" filter="url(#glowGreen)">⏻</text>
    <text x="150" y="292" text-anchor="middle" font-family="Courier New, monospace" font-size="26" fill="#00ff41" filter="url(#glowGreen)">POWER ON</text>
    <text x="150" y="328" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#00ff41" opacity="0.65">AETHERWAVE 2077 SYSTEM</text>
    <text x="150" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#777">first tap to enter</text>
  </g>

  <!-- Phone 2: Radio interface -->
  <g transform="translate(590 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="390" height="620" rx="48" fill="url(#phoneEdge)" stroke="#3d3d40" stroke-width="3"/>
    <rect x="18" y="18" width="354" height="584" rx="36" fill="#1a1a1b"/>
    <rect x="150" y="30" width="90" height="18" rx="9" fill="#101011"/>

    <rect x="18" y="18" width="354" height="56" rx="36" fill="#111"/>
    <rect x="18" y="48" width="354" height="26" fill="#111"/>
    <text x="40" y="54" font-family="Courier New, monospace" font-size="13" fill="#00ff41" filter="url(#glowGreen)">AETHERWAVE // 19:40</text>
    <rect x="296" y="34" width="50" height="18" rx="3" fill="#0c0c0d" stroke="#333"/>
    <text x="310" y="48" font-family="Courier New, monospace" font-size="9" fill="#00ff41">China</text>

    <rect x="34" y="90" width="322" height="176" rx="10" fill="#0f0f10" stroke="#242426"/>
    <text x="52" y="120" font-family="Courier New, monospace" font-size="11" fill="#ff702e" filter="url(#glowOrange)">87.5 FM - China National Radio</text>
    <line x1="52" y1="133" x2="335" y2="133" stroke="#333" stroke-dasharray="4 5"/>
    <text x="52" y="153" font-family="Courier New, monospace" font-size="11" fill="#7f7f7f">88.5 FM - Hit Music Channel</text>
    <line x1="52" y1="166" x2="335" y2="166" stroke="#333" stroke-dasharray="4 5"/>
    <text x="52" y="186" font-family="Courier New, monospace" font-size="11" fill="#7f7f7f">89.5 FM - Global News Radio</text>
    <line x1="52" y1="199" x2="335" y2="199" stroke="#333" stroke-dasharray="4 5"/>
    <text x="52" y="219" font-family="Courier New, monospace" font-size="11" fill="#7f7f7f">90.5 FM - City Night Waves</text>
    <line x1="52" y1="232" x2="335" y2="232" stroke="#333" stroke-dasharray="4 5"/>
    <text x="52" y="252" font-family="Courier New, monospace" font-size="11" fill="#7f7f7f">91.5 FM - Shortwave Archive</text>

    <rect x="34" y="286" width="322" height="148" rx="14" fill="#020202" stroke="#333" stroke-width="3"/>
    <rect x="34" y="286" width="322" height="148" rx="14" fill="url(#scan)" opacity="0.74"/>
    <text x="54" y="313" font-family="Courier New, monospace" font-size="10" fill="#00ff41" opacity="0.7">SIGNAL VISUALIZER</text>
    <path d="M50 365 C83 342,109 392,141 363 S196 334,228 363 S286 391,341 352" fill="none" stroke="#00ff41" stroke-width="3" filter="url(#glowGreen)"/>
    <path d="M50 377 C92 368,121 381,160 374 S226 366,266 376 S314 386,341 374" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.55"/>

    <rect x="18" y="458" width="354" height="144" rx="0" fill="url(#deck)" stroke="#3b3b3b"/>
    <circle cx="114" cy="490" r="18" fill="#333" stroke="#111" stroke-width="2"/>
    <text x="109" y="497" font-family="Courier New, monospace" font-size="15" fill="#ff702e">1</text>
    <circle cx="160" cy="490" r="18" fill="#333" stroke="#111" stroke-width="2"/>
    <text x="155" y="497" font-family="Courier New, monospace" font-size="15" fill="#777">2</text>
    <circle cx="206" cy="490" r="18" fill="#333" stroke="#111" stroke-width="2"/>
    <text x="201" y="497" font-family="Courier New, monospace" font-size="15" fill="#777">3</text>
    <circle cx="252" cy="490" r="18" fill="#333" stroke="#111" stroke-width="2"/>
    <text x="247" y="497" font-family="Courier New, monospace" font-size="15" fill="#777">4</text>
    <text x="195" y="538" text-anchor="middle" font-family="Courier New, monospace" font-size="24" fill="#ff702e" filter="url(#glowOrange)">87.5 MHz</text>
    <rect x="72" y="558" width="246" height="10" rx="5" fill="#0d0d0e" stroke="#3a3a3b"/>
    <rect x="75" y="561" width="84" height="4" rx="2" fill="#ff702e" opacity="0.55"/>
    <rect x="152" y="548" width="13" height="30" rx="3" fill="#777" stroke="#111"/>
    <circle cx="65" cy="548" r="25" fill="#202020" stroke="#333" stroke-width="3"/>
    <rect x="62" y="524" width="6" height="19" rx="3" fill="#ff702e" filter="url(#glowOrange)"/>
    <circle cx="325" cy="548" r="25" fill="#202020" stroke="#333" stroke-width="3"/>
    <rect x="322" y="524" width="6" height="19" rx="3" fill="#ff702e" filter="url(#glowOrange)"/>
  </g>

  <text x="370" y="835" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#e5e5e5">1. Power on</text>
  <text x="785" y="835" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#e5e5e5">2. Tune into global stations</text>
</svg>
