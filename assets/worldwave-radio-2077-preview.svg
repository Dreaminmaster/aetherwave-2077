<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Worldwave Radio 2077 interface preview">
  <title>Worldwave Radio 2077 Preview</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="10%" r="85%">
      <stop offset="0" stop-color="#303034"/>
      <stop offset="0.52" stop-color="#151516"/>
      <stop offset="1" stop-color="#070708"/>
    </radialGradient>
    <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#292929"/>
      <stop offset="1" stop-color="#181818"/>
    </linearGradient>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="rgba(255,255,255,0.04)"/>
      <rect y="3" width="6" height="3" fill="rgba(0,0,0,0.18)"/>
    </pattern>
  </defs>
