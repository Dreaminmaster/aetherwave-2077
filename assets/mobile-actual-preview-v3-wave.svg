<svg xmlns="http://www.w3.org/2000/svg" width="430" height="932" viewBox="0 0 430 932" role="img" aria-label="Actual mobile preview of the original radio page with visible oscilloscope wave">
  <title>Worldwave Radio 2077 Actual Mobile Preview V3</title>
  <defs>
    <linearGradient id="deck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="greenGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orangeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1.5" fill="rgba(0,255,65,0.08)"/>
      <rect y="1.5" width="3" height="1.5" fill="rgba(0,0,0,0.25)"/>
    </pattern>
  </defs>

  <rect width="430" height="932" fill="#1a1a1b"/>
  <rect x="0" y="0" width="430" height="60" fill="#111"/>
  <text x="18" y="36" font-family="Courier New, monospace" font-size="16" fill="#00ff41" filter="url(#greenGlow)">AETHERWAVE // 20:41</text>
  <rect x="345" y="15" width="68" height="30" rx="15" fill="#141414" stroke="#333"/>
  <text x="357" y="35" font-family="Courier New, monospace" font-size="14" fill="#00ff41">Japan</text>
  <path d="M398 23 l5 5 l5 -5 M398 35 l5 -5 l5 5" fill="none" stroke="#00ff41" stroke-width="2"/>
  <rect x="0" y="60" width="430" height="1" fill="#333"/>

  <g transform="translate(10 74)">
    <rect x="0" y="0" width="206" height="330" rx="8" fill="#0f0f10" stroke="#191919" filter="url(#shadow)"/>
    <g font-family="Courier New, monospace" font-size="13" fill="#b8b8b8">
      <text x="20" y="32">87.5 FM - BOX : Japan</text>
      <text x="20" y="52">City Pop</text>
      <line x1="12" y1="70" x2="196" y2="70" stroke="#3a3a3a" stroke-dasharray="4 4"/>
      <text x="20" y="92">88.5 FM - Japan Hits</text>
      <text x="20" y="112">- asia DR</text>
      <line x1="12" y1="130" x2="196" y2="130" stroke="#3a3a3a" stroke-dasharray="4 4"/>
      <text x="20" y="152">89.5 FM - Free FM</text>
      <text x="20" y="172">Tokyo</text>
      <line x1="12" y1="190" x2="196" y2="190" stroke="#3a3a3a" stroke-dasharray="4 4"/>
      <text x="20" y="212">90.5 FM - Jazz Sakura</text>
      <text x="20" y="232">(asia dr</text>
      <line x1="12" y1="250" x2="196" y2="250" stroke="#3a3a3a" stroke-dasharray="4 4"/>
      <text x="20" y="272">91.5 FM - Anime Para</text>
      <text x="20" y="292">Ti</text>
      <line x1="12" y1="310" x2="196" y2="310" stroke="#3a3a3a" stroke-dasharray="4 4"/>
      <text x="20" y="332">92.5 FM - FM世田谷</text>
    </g>

    <rect x="230" y="0" width="190" height="330" rx="10" fill="#041907" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
    <rect x="232" y="2" width="186" height="326" rx="9" fill="url(#scan)"/>
    <rect x="232" y="2" width="186" height="326" rx="9" fill="#00ff41" opacity="0.12"/>
    <path d="M236 164 C252 120,278 120,296 164 S335 208,356 164 S392 112,416 164" fill="none" stroke="#00ff41" stroke-width="5" opacity="0.98" filter="url(#greenGlow)"/>
    <path d="M236 184 C275 170,304 186,334 176 S388 158,416 172" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.55"/>
    <path d="M236 164 L416 164" stroke="#00ff41" stroke-width="1" opacity="0.22"/>
  </g>

  <rect x="0" y="414" width="430" height="1" fill="#444"/>
  <rect x="0" y="415" width="430" height="480" fill="url(#deck)"/>

  <circle cx="94" cy="460" r="22" fill="#333" opacity="0.95" filter="url(#shadow)"/>
  <circle cx="154" cy="460" r="22" fill="#333" opacity="0.95" filter="url(#shadow)"/>
  <circle cx="214" cy="460" r="22" fill="#333" opacity="0.95" filter="url(#shadow)"/>
  <circle cx="274" cy="460" r="22" fill="#333" opacity="0.95" filter="url(#shadow)"/>
  <circle cx="334" cy="460" r="22" fill="#333" opacity="0.95" filter="url(#shadow)"/>
  <g font-family="Courier New, monospace" font-size="15" font-weight="700" fill="#777" text-anchor="middle">
    <text x="94" y="466">1</text><text x="154" y="466">2</text><text x="214" y="466">3</text><text x="274" y="466">4</text><text x="334" y="466">5</text>
  </g>

  <text x="215" y="530" text-anchor="middle" font-family="Courier New, monospace" font-size="30" fill="#ff702e" filter="url(#orangeGlow)">87.5 MHz</text>
  <rect x="47" y="552" width="340" height="12" rx="6" fill="#0b0b0c" stroke="#444"/>
  <rect x="47" y="542" width="16" height="32" rx="3" fill="#777" stroke="#111" filter="url(#shadow)"/>

  <circle cx="89" cy="628" r="35" fill="#202020" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
  <rect x="72" y="635" width="24" height="6" rx="3" fill="#ff702e" transform="rotate(-45 84 638)" filter="url(#orangeGlow)"/>
  <circle cx="339" cy="628" r="35" fill="#202020" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
  <rect x="336" y="598" width="6" height="24" rx="3" fill="#ff702e" filter="url(#orangeGlow)"/>

  <text x="89" y="818" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#777">VOLUME</text>
  <text x="339" y="818" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#777">FINE TUNE</text>
  <text x="4" y="914" font-family="Courier New, monospace" font-size="20" fill="#c8c8c8">/by @dreamingbob</text>
  <rect x="138" y="910" width="154" height="5" rx="3" fill="#fff" opacity="0.95"/>
</svg>