<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Aetherwave 2077</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{--bg-metal:#1a1a1b;--bg-dark:#0f0f10;--accent-orange:#ff702e;--accent-green:#00ff41;--shadow-inset:inset 2px 2px 5px rgba(0,0,0,.7),inset -1px -1px 2px rgba(255,255,255,.1);--shadow-out:5px 5px 10px rgba(0,0,0,.6),-2px -2px 5px rgba(255,255,255,.05)}
    *{box-sizing:border-box}body{background:radial-gradient(circle at top,#2b2b2d 0,#151516 45%,#080809 100%);font-family:"Courier New",monospace;color:#ccc;margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}.header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111;border-bottom:1px solid #333;letter-spacing:.04em}.main-display{flex:1;display:flex;padding:10px;gap:10px;min-height:0}.channel-list{flex:1;background:var(--bg-dark);border-radius:8px;box-shadow:var(--shadow-inset);overflow-y:auto;padding:10px;font-size:12px}.channel-item{padding:8px;border-bottom:1px dashed #333;cursor:pointer;transition:.2s}.channel-item:hover{background:rgba(255,112,46,.06)}.channel-item.active{color:var(--accent-orange);text-shadow:0 0 5px var(--accent-orange);background:rgba(255,112,46,.12)}.oscilloscope{flex:1;background:#000;border-radius:12px;position:relative;overflow:hidden;border:2px solid #333;box-shadow:0 0 10px rgba(0,255,65,.1)}.crt-overlay{position:absolute;inset:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,.25) 50%),linear-gradient(90deg,rgba(255,0,0,.06),rgba(0,255,0,.02),rgba(0,0,255,.06));background-size:100% 2px,3px 100%;pointer-events:none;z-index:2}canvas{width:100%;height:100%;filter:blur(.5px)}.control-deck{height:45%;background:linear-gradient(180deg,#272727,#181818);border-top:1px solid #444;padding:20px;display:flex;flex-direction:column;gap:20px;box-shadow:0 -5px 15px rgba(0,0,0,.5)}.presets{display:flex;justify-content:center;gap:15px}.preset-btn{width:40px;height:40px;border-radius:50%;background:#333;border:none;box-shadow:var(--shadow-out);color:#666;font-weight:bold;cursor:pointer;transition:.1s}.preset-btn:active,.preset-btn.saved{box-shadow:var(--shadow-inset);color:var(--accent-orange)}.preset-btn.active-playing{background:var(--accent-orange);color:#000;box-shadow:0 0 10px var(--accent-orange)}.tuner-container{position:relative;padding:0 20px}.freq-display{text-align:center;font-size:24px;color:var(--accent-orange);margin-bottom:10px;text-shadow:0 0 8px var(--accent-orange)}input[type=range]{-webkit-appearance:none;width:100%;background:transparent}input[type=range]::-webkit-slider-runnable-track{width:100%;height:12px;cursor:pointer;background:#111;border-radius:5px;box-shadow:inset 1px 1px 5px #000;border:1px solid #333}input[type=range]::-webkit-slider-thumb{height:30px;width:15px;border-radius:2px;background:linear-gradient(to right,#444,#777,#444);cursor:pointer;-webkit-appearance:none;margin-top:-10px;box-shadow:2px 2px 5px rgba(0,0,0,.8);border:1px solid #000}.knob-section{display:flex;justify-content:space-between;align-items:center;padding:0 30px}.knob-wrapper{position:relative;text-align:center}.knob{width:60px;height:60px;border-radius:50%;background:linear-gradient(145deg,#2a2a2a,#1a1a1a);box-shadow:var(--shadow-out);border:2px solid #333;position:relative;display:flex;align-items:center;justify-content:center}.knob:after{content:"";width:4px;height:20px;background:var(--accent-orange);position:absolute;top:5px;border-radius:2px;box-shadow:0 0 5px var(--accent-orange)}.knob-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:#666;white-space:nowrap}#power-overlay{position:fixed;inset:0;background:#000;z-index:100;display:flex;justify-content:center;align-items:center;flex-direction:column;color:var(--accent-green)}.power-btn{font-size:40px;cursor:pointer;text-shadow:0 0 10px var(--accent-green);animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}select{background:#111;color:var(--accent-green);border:1px solid #333;padding:5px;font-family:inherit}.signature{position:fixed;right:12px;bottom:8px;color:#555;font-size:11px;z-index:5}@media(max-width:720px){.main-display{flex-direction:column}.control-deck{height:42%;padding:16px}.power-btn{font-size:30px}.freq-display{font-size:22px}}
  </style>
</head>
<body>
  <div id="power-overlay"><div class="power-btn" onclick="powerOn()">⏻ POWER ON</div><p style="margin-top:20px;font-size:12px;opacity:.6">AETHERWAVE 2077 SYSTEM</p></div>
  <div class="header"><div style="color:var(--accent-green)">AETHERWAVE // <span id="clock">00:00</span></div><select id="country-select" onchange="changeCountry()"><option value="China">China</option><option value="United States">USA</option><option value="Japan">Japan</option><option value="United Kingdom">UK</option><option value="Russia">Russia</option></select></div>
  <div class="main-display"><div class="channel-list" id="station-list"><div style="padding:10px;text-align:center">INITIALIZING...</div></div><div class="oscilloscope"><div class="crt-overlay"></div><canvas id="visualizer"></canvas></div></div>
  <div class="control-deck"><div class="presets"><button class="preset-btn" onclick="handlePreset(0)">1</button><button class="preset-btn" onclick="handlePreset(1)">2</button><button class="preset-btn" onclick="handlePreset(2)">3</button><button class="preset-btn" onclick="handlePreset(3)">4</button><button class="preset-btn" onclick="handlePreset(4)">5</button></div><div class="tuner-container"><div class="freq-display"><span id="freq-text">87.5</span> MHz</div><input type="range" id="tuner" min="875" max="1080" value="875" oninput="onTuning()" onchange="onTuneRelease()"></div><div class="knob-section"><div class="knob-wrapper"><div class="knob" id="vol-knob" style="transform:rotate(-135deg)"></div><span class="knob-label">VOLUME</span></div><div class="knob-wrapper"><div class="knob" id="fine-knob" style="transform:rotate(0deg)"></div><span class="knob-label">FINE TUNE</span></div></div></div>
  <div class="signature">/by @Dreaminmaster</div>
  <script>
    let audioCtx,radioAudio=new Audio(),staticNode,staticGain,analyser,isPowerOn=false,stations=[],currentStationIndex=-1,presets=[null,null,null,null,null];
    function initAudio(){audioCtx=new(window.AudioContext||window.webkitAudioContext)();const source=audioCtx.createMediaElementSource(radioAudio);analyser=audioCtx.createAnalyser();analyser.fftSize=2048;source.connect(analyser);analyser.connect(audioCtx.destination);const bufferSize=audioCtx.sampleRate*2,buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate),data=buffer.getChannelData(0);for(let i=0;i<bufferSize;i++)data[i]=Math.random()*2-1;staticNode=audioCtx.createBufferSource();staticNode.buffer=buffer;staticNode.loop=true;staticGain=audioCtx.createGain();staticGain.gain.value=0;const filter=audioCtx.createBiquadFilter();filter.type="bandpass";filter.frequency.value=1000;staticNode.connect(filter);filter.connect(staticGain);staticGain.connect(audioCtx.destination);staticNode.start()}
    function playClickSound(){if(!audioCtx)return;const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.setValueAtTime(800,audioCtx.currentTime);osc.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+.05);gain.gain.setValueAtTime(.3,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.05);osc.start();osc.stop(audioCtx.currentTime+.05)}
    function powerOn(){document.getElementById("power-overlay").style.display="none";isPowerOn=true;initAudio();playClickSound();fetchStations("China");drawVisualizer();const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.setValueAtTime(100,audioCtx.currentTime);osc.frequency.linearRampToValueAtTime(1000,audioCtx.currentTime+.5);gain.gain.setValueAtTime(0,audioCtx.currentTime);gain.gain.linearRampToValueAtTime(.2,audioCtx.currentTime+.1);gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.5);osc.start();osc.stop(audioCtx.currentTime+.5)}
    async function fetchStations(country){const list=document.getElementById("station-list");list.innerHTML='<div style="padding:10px">SCANNING ETHER...</div>';try{const resp=await fetch(`https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(country)}?limit=50&order=clickcount&reverse=true`);const data=await resp.json();stations=data.filter(s=>s.url_resolved);currentStationIndex=-1;renderList()}catch(e){list.innerHTML="SIGNAL LOST."}}
    function renderList(){const list=document.getElementById("station-list");list.innerHTML="";stations.forEach((s,i)=>{const div=document.createElement("div");div.className=`channel-item ${i===currentStationIndex?"active":""}`;div.innerText=`${(87.5+i%20).toFixed(1)} FM - ${String(s.name||"UNKNOWN").substring(0,28)}`;div.onclick=()=>selectStation(i);list.appendChild(div)})}
    function selectStation(index){if(index<0||index>=stations.length||!audioCtx)return;playClickSound();currentStationIndex=index;renderList();radioAudio.pause();staticGain.gain.cancelScheduledValues(audioCtx.currentTime);staticGain.gain.linearRampToValueAtTime(.3,audioCtx.currentTime);radioAudio.crossOrigin="anonymous";radioAudio.src=stations[index].url_resolved;setTimeout(()=>{radioAudio.play().then(()=>staticGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.5)).catch(()=>{staticGain.gain.value=.5})},500);const freq=875+(index%20)*10;document.getElementById("tuner").value=freq;document.getElementById("freq-text").innerText=(freq/10).toFixed(1)}
    function onTuning(){if(!audioCtx)return;const val=document.getElementById("tuner").value;document.getElementById("freq-text").innerText=(val/10).toFixed(1);radioAudio.volume=.1;staticGain.gain.setTargetAtTime(.4,audioCtx.currentTime,.1);if(navigator.vibrate&&val%5===0)navigator.vibrate(5)}
    function onTuneRelease(){if(!stations.length||!audioCtx)return;radioAudio.volume=1;staticGain.gain.setTargetAtTime(0,audioCtx.currentTime,.5);const val=document.getElementById("tuner").value;selectStation(Math.floor(val/10)%stations.length)}
    function changeCountry(){const sel=document.getElementById("country-select");playClickSound();fetchStations(sel.value)}
    function handlePreset(slot){playClickSound();const btn=document.querySelectorAll(".preset-btn")[slot];if(!presets[slot]){if(currentStationIndex!==-1){presets[slot]=currentStationIndex;btn.classList.add("saved")}}else selectStation(presets[slot])}
    function drawVisualizer(){const canvas=document.getElementById("visualizer"),ctx=canvas.getContext("2d");function resize(){canvas.width=canvas.clientWidth*devicePixelRatio;canvas.height=canvas.clientHeight*devicePixelRatio}resize();addEventListener("resize",resize);const dataArray=new Uint8Array(analyser.frequencyBinCount);function draw(){requestAnimationFrame(draw);analyser.getByteTimeDomainData(dataArray);ctx.fillStyle="rgba(0,0,0,.2)";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.lineWidth=2*devicePixelRatio;ctx.strokeStyle="#00ff41";ctx.shadowBlur=5;ctx.shadowColor="#00ff41";ctx.beginPath();let x=0,slice=canvas.width/dataArray.length;for(let i=0;i<dataArray.length;i++){const y=dataArray[i]/128*canvas.height/2;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);x+=slice}ctx.lineTo(canvas.width,canvas.height/2);ctx.stroke()}draw()}
    setInterval(()=>{document.getElementById("clock").innerText=new Date().toTimeString().substring(0,5)},1000);
  </script>
</body>
</html>
