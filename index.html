<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <title>World Radio 2077</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-metal: #1a1a1b;
            --bg-dark: #0f0f10;
            --accent-orange: #ff702e;
            --accent-green: #00ff41;
            --glass-shine: rgba(255, 255, 255, 0.05);
            --shadow-inset: inset 2px 2px 5px rgba(0,0,0,0.7), inset -1px -1px 2px rgba(255,255,255,0.1);
            --shadow-out: 5px 5px 10px rgba(0,0,0,0.6), -2px -2px 5px rgba(255,255,255,0.05);
        }

        body {
            background-color: var(--bg-metal);
            font-family: 'Courier New', monospace;
            color: #ccc;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* --- 布局 --- */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        .main-display {
            flex: 1;
            display: flex;
            padding: 10px;
            gap: 10px;
            height: 40%;
        }

        .channel-list {
            flex: 1;
            background: var(--bg-dark);
            border-radius: 8px;
            box-shadow: var(--shadow-inset);
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
        }

        .channel-item {
            padding: 8px;
            border-bottom: 1px dashed #333;
            cursor: pointer;
            transition: 0.2s;
        }
        .channel-item.active {
            color: var(--accent-orange);
            text-shadow: 0 0 5px var(--accent-orange);
            background: rgba(255, 112, 46, 0.1);
        }

        .oscilloscope {
            flex: 1;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
        }

        /* CRT 效果 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }

        canvas {
            width: 100%;
            height: 100%;
            filter: blur(0.5px);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- 控制台 --- */
        .control-deck {
            height: 45%;
            background: #222;
            border-top: 1px solid #444;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        /* 预设收藏按钮 */
        .presets {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .preset-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            border: none;
            box-shadow: var(--shadow-out);
            color: #666;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .preset-btn:active, .preset-btn.saved {
            box-shadow: var(--shadow-inset);
            color: var(--accent-orange);
        }
        .preset-btn.active-playing {
            background: var(--accent-orange);
            color: #000;
            box-shadow: 0 0 10px var(--accent-orange);
        }

        /* 调频滑块 */
        .tuner-container {
            position: relative;
            padding: 0 20px;
        }
        .freq-display {
            text-align: center;
            font-size: 24px;
            color: var(--accent-orange);
            font-family: monospace;
            margin-bottom: 10px;
            text-shadow: 0 0 8px var(--accent-orange);
        }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: #111;
            border-radius: 5px;
            box-shadow: inset 1px 1px 5px #000;
            border: 1px solid #333;
        }
        
        input[type=range]::-webkit-slider-thumb {
            height: 30px;
            width: 15px;
            border-radius: 2px;
            background: linear-gradient(to right, #444, #777, #444);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            border: 1px solid #000;
        }

        /* 底部旋钮区 */
        .knob-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        
        .knob {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            box-shadow: var(--shadow-out);
            border: 2px solid #333;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .knob::after {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-orange);
            position: absolute;
            top: 5px;
            border-radius: 2px;
            box-shadow: 0 0 5px var(--accent-orange);
        }
        .knob-label {
            position: absolute;
            bottom: -20px;
            font-size: 10px;
            color: #666;
        }

        /* 开关遮罩 */
        #power-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--accent-green);
        }
        .power-btn {
            font-size: 40px;
            cursor: pointer;
            text-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        select {
            background: #111;
            color: var(--accent-green);
            border: 1px solid #333;
            padding: 5px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="power-overlay">
        <div class="power-btn" onclick="powerOn()">⏻ POWER ON</div>
        <p style="margin-top:20px; font-size:12px; opacity:0.6;">WORLD RADIO 2077 SYSTEM</p>
    </div>

    <div class="header">
        <div style="color:var(--accent-green)">WORLD RADIO // <span id="clock">00:00</span></div>
        <select id="country-select" onchange="changeCountry()">
            <option value="CN">China</option>
            <option value="US">USA</option>
            <option value="JP">Japan</option>
            <option value="GB">UK</option>
            <option value="RU">Russia</option>
            <option value="AU">Australia</option>
            <option value="NZ">New Zealand</option>
            <option value="KR">South Korea</option>
            <option value="CA">Canada</option>
            <option value="FR">France</option>
            <option value="KP">North Korea</option>
            <option value="ES">Spain</option>
            <option value="CH">Switzerland</option>
            <option value="GR">Greece</option>
        </select>
    </div>

    <div class="main-display">
        <div class="channel-list" id="station-list">
            <div style="padding:10px; text-align:center;">INITIALIZING...</div>
        </div>
        <div class="oscilloscope">
            <div class="crt-overlay"></div>
            <canvas id="visualizer"></canvas>
        </div>
    </div>

    <div class="control-deck">
        <div class="presets">
            <button class="preset-btn" onclick="handlePreset(0)">1</button>
            <button class="preset-btn" onclick="handlePreset(1)">2</button>
            <button class="preset-btn" onclick="handlePreset(2)">3</button>
            <button class="preset-btn" onclick="handlePreset(3)">4</button>
            <button class="preset-btn" onclick="handlePreset(4)">5</button>
        </div>

        <div class="tuner-container">
            <div class="freq-display"><span id="freq-text">87.5</span> MHz</div>
            <input type="range" id="tuner" min="875" max="1080" value="875" 
                   oninput="onTuning()" onchange="onTuneRelease()">
        </div>

        <div class="knob-section">
            <div class="knob-wrapper" style="text-align:center;">
                <div class="knob" id="vol-knob" style="transform: rotate(-135deg);"></div>
                <span class="knob-label">VOLUME</span>
            </div>
            <div class="knob-wrapper" style="text-align:center;">
                <div class="knob" id="fine-knob" style="transform: rotate(0deg);"></div>
                <span class="knob-label">FINE TUNE</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  Worldwave Radio 2077 — Dual Mode Engine
        //  Local (HTTP) → Real waveform via CORS proxy
        //  Online (HTTPS) → Realistic simulated waveform
        // ============================================================

        const IS_LOCAL = location.protocol === 'http:' &&
                        (location.hostname === 'localhost' || location.hostname === '127.0.0.1');

        let audioCtx;
        let radioAudio = new Audio();
        let noiseSource, noiseGain, noiseFilter;
        let analyser;
        let radioAnalyser;        // 真实分析器（仅本地模式）
        let radioSource;          // MediaElementSource（仅本地模式）
        let isPowerOn = false;
        let stations = [];
        let currentStationIndex = -1;
        let presets = [null, null, null, null, null];
        let isPlaying = false;
        let isTuning = false;
        let streamState = 'idle'; // idle | searching | playing | error

        const countryMap = {
            'China': 'China',
            'USA': 'The United States Of America',
            'Japan': 'Japan',
            'UK': 'The United Kingdom Of Great Britain And Northern Ireland',
            'Russia': 'Russia',
            'Australia': 'Australia',
            'New Zealand': 'New Zealand',
            'South Korea': 'The Republic Of Korea',
            'Canada': 'Canada',
            'France': 'France',
            'North Korea': 'The Democratic Peoples Republic Of Korea',
            'Spain': 'Spain',
            'Switzerland': 'Switzerland',
            'Greece': 'Greece',
        };

        // --- 音频引擎 ---

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // 白噪音（搜台音效 + 模拟模式的数据源）
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

            noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buf;
            noiseSource.loop = true;
            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0;

            noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 1200;
            noiseFilter.Q.value = 0.7;

            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseGain);

            if (IS_LOCAL) {
                // 本地模式：噪音直连输出，分析器等播放时接电台音频
                noiseGain.connect(audioCtx.destination);
                radioAnalyser = audioCtx.createAnalyser();
                radioAnalyser.fftSize = 2048;
            } else {
                // 在线模式：噪音接到分析器 → 输出（分析器用来驱动模拟波形）
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                noiseGain.connect(analyser);
                analyser.connect(audioCtx.destination);
            }

            noiseSource.start();
        }

        function playClickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // --- 交互 ---

        function powerOn() {
            document.getElementById('power-overlay').style.display = 'none';
            isPowerOn = true;
            initAudio();
            playClickSound();
            fetchStations('China');
            drawVisualizer();

            // 开机音效
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(1000, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        async function fetchStations(countryName) {
            const list = document.getElementById('station-list');
            list.innerHTML = '<div style="padding:10px;">SCANNING ETHER...</div>';

            try {
                const apiCountry = countryMap[countryName] || countryName;
                let url = `https://de1.api.radio-browser.info/json/stations/bycountryexact/${encodeURIComponent(apiCountry)}?limit=100&order=clickcount&reverse=true`;
                let resp = await fetch(url);
                let data = await resp.json();

                if (!data || data.length === 0) {
                    url = `https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(apiCountry)}?limit=100&order=clickcount&reverse=true`;
                    resp = await fetch(url);
                    data = await resp.json();
                }

                if (IS_LOCAL) {
                    // 本地模式：所有流都可用（代理解决 CORS）
                    stations = data.filter(s => !!s.url_resolved);
                } else {
                    // 在线模式：只取 HTTPS 流
                    stations = data.filter(s => {
                        const u = s.url_resolved || s.url || '';
                        return u.startsWith('https://');
                    });
                    if (stations.length === 0) {
                        stations = data.filter(s => !!s.url_resolved).slice(0, 5);
                        list.innerHTML = `<div style="padding:10px; text-align:center; color:#ff702e;">
                            ⚠ HTTPS streams limited for ${countryName}.<br>
                            <span style="font-size:10px; color:#888;">Run locally for all stations: python3 serve.py</span>
                        </div>`;
                        setTimeout(() => renderList(), 2500);
                        return;
                    }
                }

                renderList();
            } catch (e) {
                list.innerHTML = '<div style="padding:10px; text-align:center;">SIGNAL LOST.</div>';
            }
        }

        function renderList() {
            const list = document.getElementById('station-list');
            list.innerHTML = '';
            stations.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = `channel-item ${i === currentStationIndex ? 'active' : ''}`;
                div.innerText = `${(87.5 + (i % 20)).toFixed(1)} FM - ${s.name.substring(0, 24)}`;
                div.onclick = () => selectStation(i);
                list.appendChild(div);
            });
        }

        function selectStation(index) {
            if (index < 0 || index >= stations.length) return;
            playClickSound();
            currentStationIndex = index;
            renderList();
            streamState = 'searching';
            isPlaying = false;

            const station = stations[index];
            let streamUrl = station.url_resolved || station.url;

            // 本地模式：通过代理加载
            if (IS_LOCAL) {
                streamUrl = '/proxy?url=' + encodeURIComponent(streamUrl);
            }

            // 停掉旧音频
            try { radioAudio.pause(); radioAudio.src = ''; } catch(e) {}

            // 搜台阶段：噪音大
            if (noiseGain) {
                noiseGain.gain.cancelScheduledValues(audioCtx.currentTime);
                noiseGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.1);
            }

            // 创建新音频
            radioAudio = new Audio();
            if (IS_LOCAL) {
                radioAudio.crossOrigin = 'anonymous'; // 代理是同源，需要 CORS 头
            }
            radioAudio.volume = 1.0;

            // 事件监听
            radioAudio.addEventListener('playing', () => {
                streamState = 'playing';
                isPlaying = true;
                if (noiseGain) {
                    noiseGain.gain.cancelScheduledValues(audioCtx.currentTime);
                    noiseGain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.6);
                }
                // 本地模式：接分析器
                if (IS_LOCAL && radioAnalyser) {
                    try {
                        if (radioSource) { try { radioSource.disconnect(); } catch(e){} }
                        radioSource = audioCtx.createMediaElementSource(radioAudio);
                        radioSource.connect(radioAnalyser);
                        radioAnalyser.connect(audioCtx.destination);
                    } catch(e) { console.log('Analyser connect error:', e); }
                }
            });
            radioAudio.addEventListener('error', () => {
                streamState = 'error';
                isPlaying = false;
                if (noiseGain) {
                    noiseGain.gain.cancelScheduledValues(audioCtx.currentTime);
                    noiseGain.gain.linearRampToValueAtTime(0.45, audioCtx.currentTime + 0.3);
                }
            });
            radioAudio.addEventListener('waiting', () => {
                if (streamState === 'playing' && noiseGain) {
                    noiseGain.gain.setTargetAtTime(0.18, audioCtx.currentTime, 0.2);
                }
            });
            radioAudio.addEventListener('stalled', () => {
                streamState = 'error';
                isPlaying = false;
                if (noiseGain) noiseGain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.5);
            });

            radioAudio.src = streamUrl;

            setTimeout(() => {
                radioAudio.play().catch(e => {
                    console.log('Play error:', e);
                    streamState = 'error';
                    isPlaying = false;
                    if (noiseGain) noiseGain.gain.value = 0.5;
                });
            }, 500);

            const freq = 875 + (index % 20) * 10;
            document.getElementById('tuner').value = freq;
            document.getElementById('freq-text').innerText = (freq/10).toFixed(1);
        }

        function onTuning() {
            const val = document.getElementById('tuner').value;
            document.getElementById('freq-text').innerText = (val / 10).toFixed(1);
            isTuning = true;
            streamState = 'searching';
            if (noiseGain) noiseGain.gain.setTargetAtTime(0.55, audioCtx.currentTime, 0.05);
            radioAudio.volume = 0.1;
            if (navigator.vibrate && val % 5 === 0) navigator.vibrate(5);
        }

        function onTuneRelease() {
            isTuning = false;
            radioAudio.volume = 1.0;
            const val = document.getElementById('tuner').value;
            const idx = Math.abs(Math.floor(val / 10)) % Math.max(stations.length, 1);
            selectStation(idx);
        }

        function changeCountry() {
            const sel = document.getElementById('country-select');
            playClickSound();
            fetchStations(sel.options[sel.selectedIndex].text);
        }

        function handlePreset(slot) {
            playClickSound();
            const btn = document.querySelectorAll('.preset-btn')[slot];
            if (!presets[slot] && currentStationIndex !== -1) {
                presets[slot] = currentStationIndex;
                btn.classList.add('saved');
            } else if (presets[slot] !== null) {
                selectStation(presets[slot]);
            }
        }

        // ============================================================
        //  可视化引擎
        // ============================================================

        // --- 模拟波形发生器（在线模式） ---
        // 生成类真实音频的波形数据，不是简单的正弦波
        let simPhase = 0;
        let simAmp = 0;
        let simTarget = 0;
        let simFreqs = [];     // 多频率成分
        let simEnv = 0;        // 包络

        function initSimWaveform() {
            // 随机生成多个频率成分（模拟真实音频的频谱）
            simFreqs = [];
            for (let i = 0; i < 6; i++) {
                simFreqs.push({
                    freq: 0.3 + Math.random() * 2.5,   // Hz（归一化）
                    amp: 0.2 + Math.random() * 0.8,
                    phase: Math.random() * Math.PI * 2,
                    drift: (Math.random() - 0.5) * 0.02 // 频率漂移
                });
            }
        }

        function generateSimSample(t) {
            // 根据状态决定目标振幅
            switch (streamState) {
                case 'idle':
                    simTarget = 0.02;  // 几乎平波，带微弱噪点
                    break;
                case 'searching':
                    simTarget = 0.7 + Math.random() * 0.3; // 噪音
                    break;
                case 'playing':
                    // 模拟音频：振幅有节奏地变化（像音乐/语音的包络）
                    simEnv = 0.4 + 0.3 * Math.sin(t * 0.3) + 0.2 * Math.sin(t * 0.73) + 0.1 * Math.sin(t * 1.7);
                    simEnv = Math.max(0.15, Math.min(1.0, simEnv));
                    simTarget = simEnv;
                    break;
                case 'error':
                    simTarget = 0.5 + Math.random() * 0.3; // 断断续续的噪音
                    break;
            }

            // 平滑过渡振幅
            simAmp += (simTarget - simAmp) * 0.08;

            let sample = 0;

            if (streamState === 'searching' || streamState === 'error') {
                // 纯噪音
                sample = (Math.random() * 2 - 1) * simAmp;
            } else if (streamState === 'playing') {
                // 模拟真实音频：多频率叠加 + 噪声 + 随机突变
                for (const f of simFreqs) {
                    f.freq += f.drift;
                    if (f.freq > 3 || f.freq < 0.2) f.drift *= -1;
                    sample += Math.sin(t * f.freq + f.phase) * f.amp * simAmp;
                }
                // 加随机噪声（模拟真实音频的颗粒感）
                sample += (Math.random() - 0.5) * 0.15 * simAmp;
                // 随机出现瞬态（像鼓点/音节）
                if (Math.random() < 0.003) {
                    sample += (Math.random() - 0.5) * 2 * simAmp;
                }
                sample /= simFreqs.length;
            } else {
                // idle: 几乎平坦
                sample = (Math.random() - 0.5) * 0.03;
            }

            return sample;
        }

        // --- Canvas 可视化 ---

        function resizeCanvas() {
            const canvas = document.getElementById('visualizer');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }

        function drawVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            resizeCanvas();

            const W = canvas.width, H = canvas.height, cy = H / 2;
            const numPoints = Math.min(W, 512); // 采样点数

            // 模拟模式：初始化波形
            if (!IS_LOCAL) initSimWaveform();

            // 本地模式：数据缓冲
            let realData = new Uint8Array(radioAnalyser ? radioAnalyser.fftSize : 2048);

            let tick = 0;

            function draw() {
                requestAnimationFrame(draw);
                tick++;

                const t = tick * 0.05;

                // 拖尾
                ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
                ctx.fillRect(0, 0, W, H);

                // 网格
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0, 255, 65, 0.04)';
                ctx.lineWidth = 1;
                for (let gy = 0; gy < H; gy += H / 8) {
                    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
                }
                for (let gx = 0; gx < W; gx += W / 10) {
                    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
                }
                ctx.strokeStyle = 'rgba(0, 255, 65, 0.08)';
                ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();

                // 获取波形数据
                let samples;
                if (IS_LOCAL && radioAnalyser && streamState === 'playing') {
                    // 本地模式：真实音频数据
                    radioAnalyser.getByteTimeDomainData(realData);
                    samples = new Float32Array(numPoints);
                    const step = Math.floor(realData.length / numPoints) || 1;
                    for (let i = 0; i < numPoints; i++) {
                        samples[i] = (realData[i * step] - 128) / 128;
                    }
                } else {
                    // 模拟模式 或 本地未连接
                    samples = new Float32Array(numPoints);
                    for (let i = 0; i < numPoints; i++) {
                        samples[i] = generateSimSample(t + i * 0.01);
                    }
                }

                // 计算 RMS
                let rms = 0;
                for (let i = 0; i < numPoints; i++) rms += samples[i] * samples[i];
                rms = Math.sqrt(rms / numPoints);
                const amp = Math.min(rms * 3, 1);

                // 绘制主波形
                ctx.lineWidth = 1.5 + amp * 2.5;
                ctx.strokeStyle = '#00ff41';
                ctx.shadowBlur = amp * 12;
                ctx.shadowColor = '#00ff41';
                ctx.beginPath();
                for (let i = 0; i < numPoints; i++) {
                    const x = (i / numPoints) * W;
                    const y = cy - samples[i] * cy * 0.85;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // 副波形（细节感）
                ctx.lineWidth = 1;
                ctx.strokeStyle = `rgba(0, 255, 65, ${0.15 + amp * 0.25})`;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                for (let i = 0; i < numPoints; i++) {
                    const x = (i / numPoints) * W;
                    const y = cy - samples[i] * cy * 0.85 + (Math.random() - 0.5) * 2 * amp;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            draw();
            window.addEventListener('resize', resizeCanvas);
        }

        // --- 时钟 ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().substring(0, 5);
        }, 1000);

        // --- 模式提示 ---
        if (IS_LOCAL) {
            console.log('🌊 Worldwave Radio 2077 — LOCAL MODE (real waveform enabled)');
        } else {
            console.log('🌊 Worldwave Radio 2077 — ONLINE MODE (simulated waveform)');
        }
    </script>
</body>
